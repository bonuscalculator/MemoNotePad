    const modalBody = document.getElementById("modalBody");
    const toastDiv = document.getElementById("toast");
    
    function showToast(msg, duration = 2000) {
      toastDiv.textContent = msg;
      toastDiv.classList.add("show");
      setTimeout(() => toastDiv.classList.remove("show"), duration);
    }
    
    function renderArticles() {
      const filtered = articlesData.filter(art => currentFilter === "all" || art.category === currentFilter);
      if (!grid) return;
      grid.innerHTML = "";
      filtered.forEach(article => {
        const card = document.createElement("div");
        card.className = "article-card";
        card.setAttribute("data-id", article.id);
        card.innerHTML = `
          <div class="card-badge">${article.category.toUpperCase()} • ${article.readTime}</div>
          <div class="card-content">
            <h3>${escapeHtml(article.title)}</h3>
            <div class="card-excerpt">${escapeHtml(article.excerpt)}</div>
            <div class="read-more">Read full article →</div>
          </div>
          <div class="article-footer">
            <span>📅 ${article.date}</span>
            <span>💡 ${article.tags.slice(0,2).join(", ")}</span>
          </div>
        `;
        card.addEventListener("click", (e) => {
          e.stopPropagation();
          openModal(article.id);
        });
        grid.appendChild(card);
      });
    }

    function openModal(id) {
      const article = articlesData.find(a => a.id === id);
      if (!article) return;
      modalTitle.innerHTML = escapeHtml(article.title);
      modalMeta.innerHTML = `${article.date} · ${article.readTime} · ${article.category}`;
      modalBody.innerHTML = article.content;
      modal.style.display = "flex";
      document.body.style.overflow = "hidden";
    }

    function escapeHtml(str) {
      if (!str) return "";
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
        return c;
      });
    }

    // modal close
    function closeModal() {
      modal.style.display = "none";
      document.body.style.overflow = "";
    }

    // filter pills
    function initFilters() {
      const pills = document.querySelectorAll(".pill");
      pills.forEach(pill => {
        pill.addEventListener("click", () => {
          const filterVal = pill.getAttribute("data-filter");
          if (!filterVal) return;
          currentFilter = filterVal;
          pills.forEach(p => p.classList.remove("active"));
          pill.classList.add("active");
          renderArticles();
        });
      });
    }

    // dark mode integration
    function initDarkMode() {
      const stored = localStorage.getItem("memo_notepad_settings");
      let dark = false;
      if (stored) {
        try {
          const settings = JSON.parse(stored);
          dark = settings.darkMode === true;
        } catch(e) {}
      }
      if (dark) {
        document.body.classList.add("dark-mode");
        document.body.classList.remove("light-mode");
        const toggleBtn = document.getElementById("darkModeToggle");
        if (toggleBtn) toggleBtn.innerHTML = "☀️";
      }
      const toggleBtn = document.getElementById("darkModeToggle");
      if (toggleBtn) {
        toggleBtn.addEventListener("click", () => {
          const isDark = document.body.classList.contains("dark-mode");
          if (isDark) {
            document.body.classList.remove("dark-mode");
            document.body.classList.add("light-mode");
            toggleBtn.innerHTML = "🌙";
            localStorage.setItem("memo_notepad_settings", JSON.stringify({ darkMode: false }));
          } else {
            document.body.classList.add("dark-mode");
            document.body.classList.remove("light-mode");
            toggleBtn.innerHTML = "☀️";
            localStorage.setItem("memo_notepad_settings", JSON.stringify({ darkMode: true }));
          }
        });
      }
    }

    // mobile nav
    const hamburger = document.getElementById("hamburgerBtn");
    const mobileNav = document.getElementById("mobileNav");
    if (hamburger && mobileNav) {
      hamburger.addEventListener("click", () => {
        mobileNav.classList.toggle("open");
        if (mobileNav.style.display === "flex") mobileNav.style.display = "none";
        else mobileNav.style.display = "flex";
      });
      document.querySelectorAll(".mobile-nav a").forEach(link => {
        link.addEventListener("click", () => {
          mobileNav.style.display = "none";
          mobileNav.classList.remove("open");
        });
      });
    }
    
    // close modal on background or close btn
    window.onclick = function(e) {
      if (e.target === modal) closeModal();
    };
    document.getElementById("closeModalBtn")?.addEventListener("click", closeModal);
    
    // init
    renderArticles();
    initFilters();
    initDarkMode();
    // optional smooth anchor on header home link
    document.querySelectorAll('.logo, .nav-links a').forEach(anchor => {
      anchor.addEventListener('click', (e) => {
        const href = anchor.getAttribute('href');
        if (href === '/') return; // root, fine
      });
    });
    showToast("📰 Latest articles loaded", 1500);
  })();
</script>
</body>
</html>
