          excerpt: "Practical guide showing real-world workflows for professionals and students using the online memo notepad for maximum efficiency.",
          readTime: "4 min read",
          date: "Feb 27, 2026",
          fullContent: `<p>Replace sticky notes: create a fresh memo before each meeting, write action items in bold, and share via copy-paste. For brain dumps, use a "Daily Overflow" memo to capture random ideas.</p>
          <p><strong>Workflow example:</strong> Morning brain dump (5 min), then sort into project memos. Auto-save ensures nothing vanishes.</p>
          <a href="/#app" style="display:inline-block; background:#2D6A4F; color:white; padding:10px 20px; border-radius:30px; margin-top:20px; text-decoration:none; font-weight:600;">⚡ Master Meeting Notes →</a>`
        }
      ];

      let currentFilter = "all";
      const grid = document.getElementById("articlesGrid");
      const toastDiv = document.getElementById("toast");

      function showToast(msg, duration = 2000) {
        toastDiv.textContent = msg;
        toastDiv.classList.add("show");
        setTimeout(() => toastDiv.classList.remove("show"), duration);
      }

      // Navigate to article detail page (single article view)
      function navigateToArticle(articleId) {
        // Store article data in sessionStorage to retrieve on detail page
        const article = articlesData.find(a => a.id === articleId);
        if (article) {
          sessionStorage.setItem("blogArticle", JSON.stringify(article));
          window.location.href = `/article/${articleId}`;
        }
      }

      function renderArticles() {
        const filtered = articlesData.filter(art => currentFilter === "all" || art.category === currentFilter);
        if (!grid) return;
        
        if (filtered.length === 0) {
          grid.innerHTML = '<div class="no-results">✨ No articles found. Try another category.</div>';
          return;
        }

        grid.innerHTML = "";
        filtered.forEach(article => {
          const card = document.createElement("a");
          card.className = "article-card";
          card.href = `/article/${article.id}`;
          card.setAttribute("data-id", article.id);
          
          card.innerHTML = `
            <div class="card-badge">${article.category.toUpperCase()} • ${article.readTime}</div>
            <div class="card-content">
              <h3>${escapeHtml(article.title)}</h3>
              <div class="card-excerpt">${escapeHtml(article.excerpt)}</div>
              <div class="read-more">Read full article →</div>
            </div>
            <div class="article-footer">
              <span>📅 ${article.date}</span>
              <span>💡 ${article.tags.slice(0, 2).join(", ")}</span>
            </div>
          `;
          
          // Click handler (navigation)
          card.addEventListener("click", (e) => {
            e.preventDefault();
            navigateToArticle(article.id);
          });
          
          grid.appendChild(card);
        });
      }

      function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
          if (m === '&') return '&amp;';
          if (m === '<') return '&lt;';
          if (m === '>') return '&gt;';
          return m;
        });
      }

      // Category filter logic
      function initFilters() {
        const pills = document.querySelectorAll(".pill");
        pills.forEach(pill => {
          pill.addEventListener("click", () => {
            const filterVal = pill.getAttribute("data-filter");
            if (!filterVal) return;
            currentFilter = filterVal;
            pills.forEach(p => p.classList.remove("active"));
            pill.classList.add("active");
            renderArticles();
            showToast(`Showing ${currentFilter === "all" ? "all articles" : currentFilter + " articles"}`);
          });
        });
      }

      // Dark mode (matching main site)
      function initDarkMode() {
        const stored = localStorage.getItem("memo_notepad_settings");
        let dark = false;
        if (stored) {
          try {
            const settings = JSON.parse(stored);
            dark = settings.darkMode === true;
          } catch(e) {}
        }
        if (dark) {
          document.body.classList.add("dark-mode");
          document.body.classList.remove("light-mode");
          const toggleBtn = document.getElementById("darkModeToggle");
          if (toggleBtn) toggleBtn.innerHTML = "☀️";
        }
        const toggleBtn = document.getElementById("darkModeToggle");
        if (toggleBtn) {
          toggleBtn.addEventListener("click", () => {
            const isDark = document.body.classList.contains("dark-mode");
            if (isDark) {
              document.body.classList.remove("dark-mode");
              document.body.classList.add("light-mode");
              toggleBtn.innerHTML = "🌙";
              localStorage.setItem("memo_notepad_settings", JSON.stringify({ darkMode: false }));
            } else {
              document.body.classList.add("dark-mode");
              document.body.classList.remove("light-mode");
              toggleBtn.innerHTML = "☀️";
              localStorage.setItem("memo_notepad_settings", JSON.stringify({ darkMode: true }));
            }
          });
        }
      }

      // Mobile nav
      const hamburger = document.getElementById("hamburgerBtn");
      const mobileNav = document.getElementById("mobileNav");
      if (hamburger && mobileNav) {
        hamburger.addEventListener("click", () => {
          mobileNav.classList.toggle("open");
          if (mobileNav.style.display === "flex") mobileNav.style.display = "none";
          else mobileNav.style.display = "flex";
        });
        document.querySelectorAll(".mobile-nav .nav-link").forEach(link => {
          link.addEventListener("click", () => {
            mobileNav.style.display = "none";
            mobileNav.classList.remove("open");
          });
        });
      }

      // Initialize
      renderArticles();
      initFilters();
      initDarkMode();
      showToast("📰 Latest articles ready", 1500);
    })();
  </script>
</body>
</html>
