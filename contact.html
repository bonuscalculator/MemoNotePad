<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us – Memo NotePad Online</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <style>
    .contact-wrapper { padding: 140px 0 100px; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start; }
    .contact-info h1 { font-family: var(--font-display); font-size: 3.5rem; margin-bottom: 24px; }
    .contact-method { margin-top: 40px; }
    .method-item { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
    .method-icon { 
      width: 50px; height: 50px; 
      background: var(--primary); color: white; 
      display: flex; align-items: center; justify-content: center; 
      border-radius: var(--radius-sm); 
    }
    .contact-form { 
      background: var(--surface); 
      padding: 40px; 
      border-radius: var(--radius-lg); 
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
    }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text); }
    .form-group input, .form-group textarea { 
      width: 100%; padding: 12px 16px; 
      border: 1px solid var(--border); 
      border-radius: var(--radius-sm); 
      font-family: inherit;
      background: var(--bg-alt);
    }
    .form-group input:focus { border-color: var(--primary); outline: none; }
    @media (max-width: 960px) {
      .contact-wrapper { grid-template-columns: 1fr; gap: 40px; }
      .contact-info h1 { font-size: 2.5rem; }
    }
  </style>
</head>
<body class="light-mode">
  <div id="header-root"></div>

  <div class="container">
    <div class="contact-wrapper">
      <div class="contact-info">
        <div class="section-label">✦ Get In Touch</div>
        <h1>Have a question or feedback?</h1>
        <p>Whether you're experiencing a technical issue, have a suggestion for a new feature, or just want to say hello, I'd love to hear from you.</p>
        
        <div class="contact-method">
          <div class="method-item">
            <div class="method-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </div>
            <div>
              <div style="font-size: 0.85rem; color: var(--text-muted);">Email me at</div>
              <a href="mailto:nolushac@gmail.com" style="font-weight: 600; color: var(--primary); text-decoration: none;">nolushac@gmail.com</a>
            </div>
          </div>
        </div>
      </div>

      <div class="contact-form">
        <form action="#">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Your name" required>
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="yourname@example.com" required>
          </div>
          <div class="form-group">
            <label>Message</label>
            <textarea rows="5" placeholder="How can I help you?" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
        </form>
      </div>
    </div>
  </div>

  <div id="footer-root"></div>
  <script src="header.js"></script>
  <script src="footer.js"></script>
</body>
</html>
